<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Manage your emergency contacts — SHEild AI Safety Platform.">
    <title>Emergency Contacts — SHEild AI</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="gradient-bg"></div>

    <!-- Header -->
    <header class="app-header">
        <div class="container header-inner">
            <a href="dashboard.html" class="logo">
                <div class="logo-icon">🛡️</div>
                <span>SHE<span class="text-gradient">ild</span></span>
            </a>
            <div class="header-actions">
                <a href="dashboard.html" class="btn btn-ghost btn-sm">← Dashboard</a>
            </div>
        </div>
    </header>

    <div class="page-shell">
        <div class="container">
            <div class="page-title">
                <h1>📞 Emergency Contacts</h1>
                <p>Add up to 5 trusted contacts who will be notified during an emergency.</p>
            </div>

            <!-- Add Contact Form -->
            <div class="glass-card-static" style="padding: var(--space-xl); margin-bottom: var(--space-xl);"
                id="contact-form-card">
                <h3 style="margin-bottom: var(--space-lg);" id="form-title">Add New Contact</h3>

                <div class="form-group">
                    <label class="form-label" for="contact-name">Full Name</label>
                    <input type="text" id="contact-name" class="form-input" placeholder="Enter contact name"
                        maxlength="40">
                </div>

                <div class="form-group">
                    <label class="form-label" for="contact-phone">Phone Number</label>
                    <input type="tel" id="contact-phone" class="form-input" placeholder="Enter phone number"
                        maxlength="15">
                </div>

                <div class="form-group">
                    <label class="form-label" for="contact-relation">Relationship</label>
                    <select id="contact-relation" class="form-select">
                        <option value="">Select relationship</option>
                        <option value="Parent">Parent</option>
                        <option value="Sibling">Sibling</option>
                        <option value="Spouse">Spouse</option>
                        <option value="Friend">Friend</option>
                        <option value="Colleague">Colleague</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <input type="hidden" id="edit-index" value="-1">

                <div style="display: flex; gap: var(--space-md);">
                    <button class="btn btn-secondary btn-block" id="save-contact-btn" onclick="saveContact()">
                        ➕ Add Contact
                    </button>
                    <button class="btn btn-outline" id="cancel-edit-btn" style="display:none;" onclick="cancelEdit()">
                        Cancel
                    </button>
                </div>
            </div>

            <!-- Contacts List -->
            <div id="contacts-list"></div>

            <!-- Empty State -->
            <div class="glass-card-static text-center" style="padding: var(--space-2xl); display:none;"
                id="empty-state">
                <div style="font-size: 3rem; margin-bottom: var(--space-md);">📇</div>
                <h3>No Contacts Added</h3>
                <p style="color: var(--text-secondary);">Add your trusted contacts above to get started.</p>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script src="js/script.js"></script>
</body>

</html>
